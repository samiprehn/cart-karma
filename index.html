<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cart Karma — Ethical Amazon Alternative Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #14532d 0%, #064e3b 100%);
      color: #f0fdf4;
      padding: 0 16px 64px;
    }

    header {
      text-align: center;
      padding: 56px 16px 32px;
    }

    .logo {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #4ade80, #a3e635);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      margin-top: 8px;
      font-size: 1.1rem;
      color: #86efac;
      opacity: 0.9;
    }

    .search-wrap {
      max-width: 640px;
      margin: 32px auto 0;
      display: flex;
      gap: 10px;
    }

    #search-input {
      flex: 1;
      padding: 14px 20px;
      border-radius: 12px;
      border: 2px solid #166534;
      background: rgba(255,255,255,0.08);
      color: #f0fdf4;
      font-size: 1.05rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    #search-input::placeholder { color: #86efac; opacity: 0.6; }
    #search-input:focus { border-color: #4ade80; background: rgba(255,255,255,0.12); }

    #search-btn {
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #16a34a, #15803d);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      white-space: nowrap;
    }

    #search-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
    #search-btn:active { transform: translateY(0); }

    #results-area {
      max-width: 900px;
      margin: 40px auto 0;
    }

    .empty-state {
      text-align: center;
      padding: 60px 16px;
      color: #86efac;
      font-size: 1.1rem;
      opacity: 0.7;
    }

    .results-header {
      font-size: 0.9rem;
      color: #86efac;
      margin-bottom: 20px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      border-left: 3px solid #4ade80;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
    }

    .card {
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeInUp 0.35s ease forwards;
    }

    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 16px 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .store-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
    }

    .type-badge {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 9px;
      border-radius: 20px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .store-why {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.4;
    }

    /* Header gradient by type */
    .card-header.indie     { background: linear-gradient(135deg, #0d9488, #0ea5e9); }
    .card-header.coop      { background: linear-gradient(135deg, #7c3aed, #a855f7); }
    .card-header.bcorp     { background: linear-gradient(135deg, #16a34a, #15803d); }
    .card-header.secondhand { background: linear-gradient(135deg, #d97706, #b45309); }
    .card-header.local-finder { background: linear-gradient(135deg, #4f46e5, #7c3aed); }

    .card-body {
      padding: 14px 18px 16px;
    }

    .card-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, transform 0.1s;
      cursor: pointer;
    }

    .btn-link:hover { transform: translateY(-1px); }

    .btn-website {
      background: rgba(255,255,255,0.12);
      color: #f0fdf4;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-website:hover { background: rgba(255,255,255,0.2); }

    .btn-search {
      background: rgba(74,222,128,0.15);
      color: #4ade80;
      border: 1px solid rgba(74,222,128,0.3);
    }

    .btn-search:hover { background: rgba(74,222,128,0.25); }
  </style>
</head>

      for (const [cat, data] of Object.entries(CATEGORIES)) {
        if (cat === 'general') continue;
        if (data.keywords.some(k => q.includes(k))) return cat;
      }
      return 'general';
    }

    function buildSearchUrl(template, query) {
      if (!template) return null;
      return template.replace('{q}', encodeURIComponent(query));
    }

    function renderCard(alt, query, delay) {
      const searchUrl = buildSearchUrl(alt.search_url, query);
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = `${delay}ms`;

      card.innerHTML = `
        <div class="card-header ${alt.type}">
          <div class="card-header-top">
            <span class="store-name">${alt.name}</span>
            <span class="type-badge">${TYPE_LABELS[alt.type] || alt.type}</span>
          </div>
          <div class="store-why">${alt.why}</div>
        </div>
        <div class="card-body">
          <div class="card-buttons">
            <a class="btn-link btn-website" href="${alt.website}" target="_blank" rel="noopener noreferrer">
              🌐 Website
            </a>
            ${searchUrl ? `<a class="btn-link btn-search" href="${searchUrl}" target="_blank" rel="noopener noreferrer">🔍 Search there</a>` : ''}
          </div>
        </div>
      `;
      return card;
    }

    function doSearch(query) {
      const q = query.trim();
      if (!q) return;

      const area = document.getElementById('results-area');
      area.innerHTML = '';

      const cat = findCategory(q);
      const isGeneral = cat === 'general';
      const alts = CATEGORIES[cat].alternatives;

      const header = document.createElement('div');
      header.className = 'results-header';
      if (isGeneral) {
        header.textContent = `We don't have specific alternatives for "${q}" — here are some general options:`;
      } else {
        const catLabel = cat.charAt(0).toUpperCase() + cat.slice(1);
        header.textContent = `Found ${alts.length} ethical alternatives in: ${catLabel}`;
      }
      area.appendChild(header);

      const grid = document.createElement('div');
      grid.className = 'cards-grid';

      alts.forEach((alt, i) => {
        grid.appendChild(renderCard(alt, q, i * 60));
      });

      area.appendChild(grid);
    }

    document.getElementById('search-btn').addEventListener('click', () => {
      doSearch(document.getElementById('search-input').value);
    });

    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        doSearch(e.target.value);
      }
    });
  </script>
</body>
</html>
